# CodeRabbit reviews should stay concise and use this repo's own standards.
language: 'en-US'

reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - 'AGENTS.md'
      - 'agent-rules/**/*.md'
      - 'docs/development/**/*.md'
      - 'docs/architecture/**/*.md'
      - 'docs/product/**/*.md'

chat:
  auto_reply: true
  art: false
